name: ANA Sale Notifier

on:
  schedule:
    # 毎日 10:30 JST (UTC 01:30) に実行
    - cron: '30 1 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  notify:
    runs-on: ubuntu-latest
    environment: production 

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        run: ./gradlew build -x test --no-daemon

      # ↓ 確認用（原因特定後に削除）
      - name: Debug secrets check
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          if [ -z "$SLACK_BOT_TOKEN" ]; then
            echo "SLACK_BOT_TOKEN is EMPTY or NOT SET"
          else
            echo "SLACK_BOT_TOKEN is SET (length: ${#SLACK_BOT_TOKEN})"
          fi
          if [ -z "$SLACK_CHANNEL_ID" ]; then
            echo "SLACK_CHANNEL_ID is EMPTY or NOT SET"
          else
            echo "SLACK_CHANNEL_ID is SET"
          fi

      - name: Run Application
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: ./gradlew bootRun --no-daemon